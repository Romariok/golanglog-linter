version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign

linters_settings:
  custom:
    golanglog:
      type: module
      description: "Validates log message style and security"
      settings:
        rules:
          lowercase: true
          english: true
          special-chars: true
          sensitive: true
        sensitive-keywords:
          - password
          - token
          - secret
          - api_key
          - apikey
          - auth
          - credential
          - private_key
        custom-patterns:
          - "credit.?card"
          - "ssn"
